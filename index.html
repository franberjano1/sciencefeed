<!DOCTYPE html>

<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ScienceFeed</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:Georgia,serif;background:#fafaf7;color:#1a1a1a;font-size:15px}
#app{max-width:800px;margin:0 auto}
header{background:#1a1a1a;padding:14px 16px 0;border-bottom:3px solid #1a5c38}
.mh{display:flex;align-items:baseline;gap:10px;margin-bottom:4px}
.mh h1{font-size:22px;font-weight:600;color:#fff}
.mh span{font-size:11px;color:#888;border-left:1px solid #444;padding-left:10px;font-family:sans-serif}
.dl{font-size:10px;color:#555;letter-spacing:1px;margin-bottom:10px;font-family:sans-serif}
.fb{display:flex;gap:6px;flex-wrap:wrap;padding-bottom:10px}
.pill{background:transparent;border:1px solid #555;color:#bbb;padding:4px 12px;border-radius:20px;font-size:12px;cursor:pointer;font-family:sans-serif}
.pill.on{background:#1a5c38;border-color:#1a5c38;color:#fff}
.pill.fav.on{background:#7a2a1a;border-color:#7a2a1a}
.tb{display:flex;gap:8px;padding:10px 12px;background:#fff;border-bottom:1px solid #e0dbd0}
.tb input{flex:1;border:1px solid #d8d4cc;border-radius:4px;padding:7px 12px;font-size:13px;font-family:sans-serif;background:#fafaf7;color:#1a1a1a;outline:none}
.tb button{background:#1a5c38;color:#fff;border:none;padding:7px 14px;border-radius:4px;font-size:13px;cursor:pointer;font-family:sans-serif}
.tb button:disabled{opacity:0.5}
.cnt{padding:5px 12px;font-size:11px;color:#aaa;background:#fff;border-bottom:1px solid #e0dbd0;font-family:sans-serif;display:none}
.err{margin:8px 12px;padding:8px 12px;background:#fff3f0;border-left:3px solid #8B3A2A;font-size:12px;color:#8B3A2A;font-family:sans-serif}
.sh{padding:6px 12px;background:#f0ede6;border-bottom:1px solid #ddd;border-top:1px solid #ddd;font-size:10px;letter-spacing:1.5px;text-transform:uppercase;font-family:sans-serif;font-weight:500}
.art{display:flex;gap:10px;padding:12px;border-bottom:1px solid #e8e4dc;background:#fff;cursor:pointer;align-items:flex-start}
.art:hover{background:#f9f7f2}
.ab{flex:1;min-width:0}
.as{font-size:10px;letter-spacing:1px;text-transform:uppercase;font-family:sans-serif;margin-bottom:3px;font-weight:500}
.at{font-size:15px;line-height:1.4;margin-bottom:4px}
.ad{font-size:12px;color:#888;line-height:1.5;font-family:sans-serif;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.am{display:flex;gap:8px;margin-top:6px;align-items:center}
.tag{background:#f0ede6;color:#888;font-size:10px;padding:2px 8px;border-radius:3px;font-family:sans-serif}
.dt{font-size:10px;color:#bbb;font-family:sans-serif}
.fb2{background:none;border:none;cursor:pointer;font-size:20px;line-height:1;padding:2px 4px;color:#ccc;flex-shrink:0}
.fb2.on{color:#c0850a}
.st{text-align:center;padding:48px 16px;font-family:sans-serif;color:#999}
.sp{width:24px;height:24px;border:2px solid #ddd;border-top-color:#1a5c38;border-radius:50%;animation:spin .7s linear infinite;margin:0 auto 16px}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<div id="app">
  <header>
    <div class="mh"><h1>ScienceFeed</h1><span>Recursos Naturales &middot; Ciencias &middot; IA</span></div>
    <div class="dl" id="dl"></div>
    <div class="fb" id="fb">
      <button class="pill on" data-c="Todo">Todo</button>
      <button class="pill" data-c="RN">Rec. Naturales</button>
      <button class="pill" data-c="Bio">Biologia</button>
      <button class="pill" data-c="Amb">Ambiente</button>
      <button class="pill" data-c="Fis">Fisica</button>
      <button class="pill" data-c="IA">IA / Tech</button>
      <button class="pill fav" data-c="favs">&#9733; Guardados</button>
    </div>
  </header>
  <div class="tb">
    <input type="text" id="sq" placeholder="Buscar articulos...">
    <button id="rb" onclick="loadAll()">&#8635; Actualizar</button>
  </div>
  <div id="cnt" class="cnt"></div>
  <div id="ez"></div>
  <div id="feed"><div class="st"><div class="sp"></div><p>Cargando articulos...</p></div></div>
</div>
<script>
var FEEDS=[
  {id:'quanta',name:'Quanta Magazine',rss:'https://www.quantamagazine.org/feed/',color:'#1a5c38',cat:'Fis'},
  {id:'snews',name:'Science News',rss:'https://www.sciencenews.org/feed',color:'#185FA5',cat:'Bio'},
  {id:'sdaily',name:'ScienceDaily',rss:'https://www.sciencedaily.com/rss/all.xml',color:'#555',cat:'Bio'},
  {id:'physorg',name:'Phys.org',rss:'https://phys.org/rss-feed/',color:'#8B3A2A',cat:'Fis'},
  {id:'sciam',name:'Scientific American',rss:'https://www.scientificamerican.com/observations/feed/',color:'#6a4c93',cat:'Bio'},
  {id:'yale',name:'Yale Env 360',rss:'https://e360.yale.edu/feed',color:'#2d6a4f',cat:'RN'},
  {id:'carbon',name:'Carbon Brief',rss:'https://www.carbonbrief.org/feed/',color:'#1b7a8a',cat:'Amb'},
  {id:'nasa',name:'NASA Earth Obs.',rss:'https://earthobservatory.nasa.gov/feeds/earth-observatory.rss',color:'#003f7f',cat:'RN'},
  {id:'mit',name:'MIT News AI',rss:'https://news.mit.edu/rss/topic/artificial-intelligence2',color:'#8B0000',cat:'IA'},
  {id:'usgs',name:'USGS Newsroom',rss:'https://www.usgs.gov/news/feed',color:'#4a6741',cat:'RN'}
];

var KW={
RN:[‘water’,‘hydro’,‘watershed’,‘forest’,‘land use’,‘soil’,‘conservation’,‘natural resource’,‘biodiversity’,‘ecosystem’,‘deforestation’,‘wildfire’,‘species’,‘habitat’,‘wetland’,‘mangrove’,‘groundwater’,‘reforestation’,‘biomass’],
Bio:[‘gene’,‘protein’,‘cell’,‘evolution’,‘organism’,‘bacteria’,‘virus’,‘dna’,‘rna’,‘ecology’,‘microbe’,‘marine’,‘plant’,‘animal’,‘fungi’,‘genome’],
Fis:[‘quantum’,‘particle’,‘relativity’,‘energy’,‘photon’,‘gravity’,‘dark matter’,‘thermodynamics’,‘black hole’,‘cosmology’],
Amb:[‘climate’,‘carbon’,‘emission’,‘pollution’,‘atmosphere’,‘ocean’,‘arctic’,‘greenhouse’,‘drought’,‘flood’,‘sea level’,‘renewable’,‘sustainability’],
IA:[‘artificial intelligence’,‘machine learning’,‘neural network’,‘deep learning’,‘language model’,‘robot’,‘autonomous’,‘llm’]
};

var CC={RN:’#2d6a4f’,Bio:’#185FA5’,Amb:’#1b7a8a’,Fis:’#6a4c93’,IA:’#8B0000’};
var CL=[‘RN’,‘Bio’,‘Amb’,‘Fis’,‘IA’];
var CN={RN:‘Rec. Naturales’,Bio:‘Biologia’,Amb:‘Ambiente’,Fis:‘Fisica’,IA:‘IA / Tech’};

var all=[],favs=new Set(),cur=‘Todo’,sq=’’;

function loadFavs(){try{var s=localStorage.getItem(‘sf2’);if(s)favs=new Set(JSON.parse(s));}catch(e){}}
function saveFavs(){try{localStorage.setItem(‘sf2’,JSON.stringify(Array.from(favs)));}catch(e){}}

function guessCat(title,desc,src){
var t=(title+’ ’+desc).toLowerCase();
for(var c in KW){if(KW[c].some(function(k){return t.indexOf(k)>=0;}))return c;}
return src.cat;
}

function timeAgo(d){
try{
var diff=(Date.now()-new Date(d))/1000;
if(diff<3600)return Math.floor(diff/60)+‘m’;
if(diff<86400)return Math.floor(diff/3600)+‘h’;
if(diff<604800)return Math.floor(diff/86400)+‘d’;
return new Date(d).toLocaleDateString(‘es’,{day:‘numeric’,month:‘short’});
}catch(e){return ‘’;}
}

function fetchFeed(src){
var url=‘https://api.allorigins.win/get?url=’+encodeURIComponent(src.rss);
return fetch(url)
.then(function(r){return r.json();})
.then(function(d){
if(!d||!d.contents)return null;
var parser=new DOMParser();
var doc=parser.parseFromString(d.contents,‘text/xml’);
var items=doc.querySelectorAll(‘item’);
var result=[];
for(var i=0;i<Math.min(items.length,12);i++){
var item=items[i];
var title=item.querySelector(‘title’) ? item.querySelector(‘title’).textContent : ‘’;
var link=item.querySelector(‘link’) ? item.querySelector(‘link’).textContent : ‘’;
var desc=item.querySelector(‘description’) ? item.querySelector(‘description’).textContent : ‘’;
var date=item.querySelector(‘pubDate’) ? item.querySelector(‘pubDate’).textContent : ‘’;
desc=desc.replace(/<[^>]+>/g,’’).substring(0,200);
result.push({
id:src.id+’::’+link,
title:title,
desc:desc,
link:link,
date:date,
source:src.name,
color:src.color,
cat:guessCat(title,desc,src)
});
}
return result;
})
.catch(function(){return null;});
}

function loadAll(){
var btn=document.getElementById(‘rb’);
btn.disabled=true; btn.textContent=‘Cargando…’;
document.getElementById(‘ez’).innerHTML=’’;
document.getElementById(‘cnt’).style.display=‘none’;
document.getElementById(‘feed’).innerHTML=’<div class="st"><div class="sp"></div><p>Cargando articulos…</p></div>’;

Promise.all(FEEDS.map(fetchFeed)).then(function(results){
var failed=[];
all=[];
for(var i=0;i<results.length;i++){
if(results[i]===null)failed.push(FEEDS[i].name);
else all=all.concat(results[i]);
}
all.sort(function(a,b){return new Date(b.date)-new Date(a.date);});
btn.disabled=false; btn.textContent=’\u8635 Actualizar’;
if(failed.length)document.getElementById(‘ez’).innerHTML=’<div class="err">Sin respuesta: ‘+failed.join(’, ‘)+’</div>’;
render();
});
}

function render(){
var isFavs=cur===‘favs’;
var filtered=all.filter(function(a){
if(isFavs)return favs.has(a.id);
if(cur!==‘Todo’&&a.cat!==cur)return false;
if(sq&&a.title.toLowerCase().indexOf(sq)<0&&a.desc.toLowerCase().indexOf(sq)<0)return false;
return true;
});

var cnt=document.getElementById(‘cnt’);
cnt.style.display=‘block’;
cnt.textContent=filtered.length+’ articulos’+(isFavs?’ guardados’:cur!==‘Todo’?’ en ‘+CN[cur]:’’);

if(!filtered.length){
document.getElementById(‘feed’).innerHTML=’<div class="st"><p style="font-size:28px;margin-bottom:12px">’+(isFavs?’☆’:’🔍’)+’</p><p>’+(isFavs?‘No tenes articulos guardados.’:‘Sin resultados.’)+’</p></div>’;
return;
}

var grouped={};
filtered.forEach(function(a){if(!grouped[a.cat])grouped[a.cat]=[];grouped[a.cat].push(a);});
var keys=(cur===‘Todo’||isFavs)?CL.filter(function(k){return grouped[k];}):([cur].filter(function(k){return grouped[k];}));

var html=’’;
keys.forEach(function(cat){
if(cur===‘Todo’||isFavs)html+=’<div class="sh" style="color:'+(CC[cat]||'#666')+'">’+CN[cat]+’</div>’;
(grouped[cat]||[]).forEach(function(a){
var fav=favs.has(a.id);
var safeLink=a.link.replace(/’/g,’’);
html+=’<div class="art" onclick="openArt(\''+safeLink+'\',event)">’
+’<div class="ab">’
+’<div class="as" style="color:'+a.color+'">’+a.source+’</div>’
+’<div class="at">’+a.title+’</div>’
+’<div class="ad">’+a.desc+’</div>’
+’<div class="am"><span class="tag">’+CN[a.cat]+’</span><span class="dt">’+timeAgo(a.date)+’</span></div>’
+’</div>’
+’<button class="fb2'+(fav?' on':'')+'" onclick="toggleFav(\''+a.id+'\',this)">’+(fav?’★’:’☆’)+’</button>’
+’</div>’;
});
});
document.getElementById(‘feed’).innerHTML=html;
}

function openArt(link,e){
if(e.target.classList.contains(‘fb2’))return;
window.open(link,’_blank’);
}

function toggleFav(id,btn){
if(favs.has(id)){favs.delete(id);btn.innerHTML=’☆’;btn.classList.remove(‘on’);}
else{favs.add(id);btn.innerHTML=’★’;btn.classList.add(‘on’);}
saveFavs();
}

document.getElementById(‘dl’).textContent=new Date().toLocaleDateString(‘es’,{weekday:‘long’,year:‘numeric’,month:‘long’,day:‘numeric’}).toUpperCase();

document.getElementById(‘fb’).addEventListener(‘click’,function(e){
var p=e.target.closest(’.pill’);if(!p)return;
cur=p.getAttribute(‘data-c’);
document.querySelectorAll(’.pill’).forEach(function(x){x.classList.remove(‘on’);});
p.classList.add(‘on’);
render();
});

document.getElementById(‘sq’).addEventListener(‘input’,function(e){
sq=e.target.value.toLowerCase();render();
});

loadFavs();
loadAll();
</script>

</body>
</html>
